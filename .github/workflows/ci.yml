name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test with Coverage
        run: go test -coverprofile=coverage.out -covermode=count ./...
      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
