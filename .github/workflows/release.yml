name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build cross-platform binaries
        run: |
          mkdir -p dist
          GOOS=linux   GOARCH=amd64 go build -ldflags="-s -w" -o dist/cf-linux-amd64   ./cmd/cf
          GOOS=linux   GOARCH=arm64 go build -ldflags="-s -w" -o dist/cf-linux-arm64   ./cmd/cf
          GOOS=darwin  GOARCH=amd64 go build -ldflags="-s -w" -o dist/cf-darwin-amd64  ./cmd/cf
          GOOS=darwin  GOARCH=arm64 go build -ldflags="-s -w" -o dist/cf-darwin-arm64  ./cmd/cf
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dist/cf-windows-amd64.exe ./cmd/cf

          # Create tarballs
          cd dist
          tar czf cf-linux-amd64.tar.gz   cf-linux-amd64
          tar czf cf-linux-arm64.tar.gz   cf-linux-arm64
          tar czf cf-darwin-amd64.tar.gz  cf-darwin-amd64
          tar czf cf-darwin-arm64.tar.gz  cf-darwin-arm64
          zip      cf-windows-amd64.zip   cf-windows-amd64.exe

      - name: Compute SHA256s
        run: |
          cd dist
          echo "darwin-arm64: $(sha256sum cf-darwin-arm64.tar.gz | cut -d' ' -f1)"
          echo "darwin-amd64: $(sha256sum cf-darwin-amd64.tar.gz | cut -d' ' -f1)"
          echo "linux-arm64:  $(sha256sum cf-linux-arm64.tar.gz  | cut -d' ' -f1)"
          echo "linux-amd64:  $(sha256sum cf-linux-amd64.tar.gz  | cut -d' ' -f1)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz,dist/*.zip
          generate_release_notes: true
